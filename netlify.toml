[functions]
  directory = "netlify/functions"

# Proxy /api/openai/* to the serverless function (must come BEFORE SPA catch-all)
[[redirects]]
  from = "/api/openai/*"
  to = "/.netlify/functions/openai-proxy/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/favicon.*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
