[build]
  command = "npm run build"
  publish = "dist"

# IMPORTANT: Set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY
# in Netlify dashboard > Site settings > Environment variables.
# Do NOT hardcode credentials in this file.

# SPA fallback - must come before other rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/favicon.*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
